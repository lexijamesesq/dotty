# SSH server hardening for local network inter-machine access
# Deployed to /etc/ssh/sshd_config.d/000-local.conf by setup-ssh.sh
# 000- prefix ensures these settings take precedence over 100-macos.conf

PasswordAuthentication no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no

AllowUsers lexi

X11Forwarding no
AllowAgentForwarding no
AllowTcpForwarding no
PermitTunnel no
